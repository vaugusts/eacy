name: Validate Repo Backbone

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON foundation schemas
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in [
              Path("schemas/command-registry.schema.json"),
              Path("schemas/policy-rule.schema.json"),
              Path("schemas/audit-entry.schema.json"),
          ]:
              json.loads(path.read_text())
              print(f"validated {path}")
          PY

      - name: Validate repo backbone
        run: python3 -m apps.router.cli validate-repo

      - name: Run contract and integration tests
        run: python3 -m unittest discover -s tests
